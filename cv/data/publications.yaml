# ----------------------------------------------------------------
# publications.yaml — source of truth for CV publications.
#
# Each list entry is one citation rendered in the CV.
# Entries within a category render reverse-chronological (newest first).
#
# REQUIRED FIELDS
#   category    one of: book | journal-article | book-chapter |
#                       report | commentary | blog | in-progress
#   year        integer, OR the literal string "in press" / "in preparation"
#   authors     APA-style string; rendered verbatim
#               (e.g., "Briggs, D. C., McClure, K., & Davis, L.")
#   title       string
#
# OPTIONAL FIELDS
#   venue       journal / book title / outlet / podcast name
#   editors     "A. Alonzo & A. Gotwals (Eds.)"  (book-chapter)
#   volume      "46"
#   issue       "2"
#   pages       "961-971"
#   publisher   "Routledge"     (book, book-chapter)
#   location    "New York, NY"  (book, book-chapter, report)
#   doi         "10.1080/..."   bare DOI, no URL prefix — renderer prepends it
#   url         full URL; used when there is no DOI
#   note        free-text trailer, e.g., "Report for Denver Public Schools"
#   status      "in press" | "in preparation" | "under review"
#   tags        YAML list of topic keywords used by the "By Topic" view on the
#               CV Publications section. A publication may have multiple tags;
#               it will appear once per tag in the topic view. Current tags in use:
#               vertical scaling, growth modeling, causal inference,
#               learning progressions, item response theory, rasch model,
#               history of measurement, educational measurement,
#               large-scale assessment, assessment policy, diagnostic assessment,
#               value-added modeling, teacher evaluation, test preparation,
#               meta-analysis, validity, formative assessment, science education,
#               fairness.
#   featured    true/false — when true, the entry is surfaced in a "Selected
#               Publications" section at the top of the Publications section,
#               in addition to its normal placement in its category. Keep the
#               featured set small (5-7 signature works) so the section stays
#               curatorial, not inflationary.
#
# DATA-ENTRY NOTES
#   - Author style: APA 7 (comma-separated; "&" before last; space between initials).
#   - DOIs: strip any "https://doi.org/" prefix; keep only bare "10.xxx/...".
#   - Where the old CV has only a URL (no DOI), use `url`.
#   - Dissertation and Encyclopedia entries are kept in their original CV
#     category even when non-standard, to preserve user's taxonomy.
# ----------------------------------------------------------------

